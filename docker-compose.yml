version: '3.8'

services:
  # MySQL: 核心业务数据
  mysql:
    image: mysql:8.0
    container_name: news-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: news_javaweb
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - news-network

  # Redis: 缓存与限流
  redis:
    image: redis:7.0
    container_name: news-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - news-network

  # MongoDB: 评论系统
  mongodb:
    image: mongo:6.0
    container_name: news-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - news-network

  # Elasticsearch: 全文搜索与热点聚合
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: news-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./data/es:/usr/share/elasticsearch/data
    networks:
      - news-network

  # MinIO: 图片存储
  minio:
    image: minio/minio
    container_name: news-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - news-network

networks:
  news-network:
    driver: bridge
